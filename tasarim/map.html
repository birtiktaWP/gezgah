<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#120c63" />
  <title>Harita — Gezgah</title>
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app map-page">

    <!-- HARİTA -->
    <div id="map"></div>

    <!-- ÜST BAR -->
    <div class="map-top">
      <a class="map-back" href="index.html" aria-label="Geri">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div class="map-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Konum · <strong id="mapLoc">Kadıköy, İstanbul</strong></span>
      </div>
    </div>

    <!-- KATEGORİLER -->
    <div class="map-cats" id="mapCats">
      <button class="pill is-active" data-cat="tümü">
        <span class="p-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        Tümü
      </button>
      <button class="pill" data-cat="kafe">
        <span class="p-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></span>
        Kafe
      </button>
      <button class="pill" data-cat="restoran">
        <span class="p-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2a2 2 0 0 0 2-2V2"/><path d="M5 2v20"/><path d="M19 2v20"/><path d="M19 2c-2 0-3 2-3 5s1 5 3 5"/></svg></span>
        Restoran
      </button>
      <button class="pill" data-cat="suşi">
        <span class="p-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg></span>
        Suşi
      </button>
      <button class="pill" data-cat="tatlı">
        <span class="p-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></span>
        Tatlı
      </button>
      <button class="pill" data-cat="vegan">
        <span class="p-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg></span>
        Vegan
      </button>
    </div>

    <!-- KONUMUM -->
    <button class="map-locate" id="mapLocate" aria-label="Konumum">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>
    </button>

    <!-- AIRBNB TARZI ALT KART -->
    <div class="map-card" id="mapCard" aria-hidden="true">
      <button class="mc-close" id="mapCardClose" aria-label="Kapat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <img class="mc-img" id="mcImg" src="" alt="" />
      <div class="mc-body">
        <div class="mc-top">
          <span class="mc-name" id="mcName"></span>
          <span class="mc-rate"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .9-5 4.8 1.3 7L12 18l-6.3 3.2L7 14.2 2 9.4l7-.9z"/></svg><b id="mcRate"></b></span>
        </div>
        <div class="mc-sub" id="mcSub"></div>
        <div class="mc-foot">
          <span class="mc-price" id="mcPrice"></span>
          <a class="mc-btn" id="mcLink" href="detail.html">Detayı Gör</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Mekan verileri (Kadıköy / İstanbul çevresi)
    var PLACES = [
      { name: "Petra Roasting Co.", lat: 40.9810, lng: 29.0270, rating: "4.9", cat: "Kahve & Brunch", dist: "3.5 km", price: "₺₺", img: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=320&q=70", tags: ["kafe"] },
      { name: "Çiya Sofrası", lat: 40.9905, lng: 29.0258, rating: "4.8", cat: "Geleneksel Türk", dist: "1.2 km", price: "₺250", img: "https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=320&q=70", tags: ["restoran"] },
      { name: "Forno İtalyan", lat: 40.9868, lng: 29.0331, rating: "4.6", cat: "Pizza & Makarna", dist: "0.8 km", price: "₺320", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=320&q=70", tags: ["restoran"] },
      { name: "Sakura Sushi", lat: 40.9942, lng: 29.0292, rating: "4.9", cat: "Suşi", dist: "2.4 km", price: "₺480", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=320&q=70", tags: ["suşi", "restoran"] },
      { name: "Moda Sahil Kafe", lat: 40.9772, lng: 29.0248, rating: "4.7", cat: "Kahve & Tatlı", dist: "0.6 km", price: "₺180", img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=320&q=70", tags: ["kafe", "tatlı"] },
      { name: "Yeşil Bahçe", lat: 40.9931, lng: 29.0205, rating: "4.5", cat: "Vejetaryen", dist: "1.6 km", price: "₺190", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=320&q=70", tags: ["vegan", "restoran"] }
    ];

    var _map, _pins = [], _active = null, PinOverlay = null, _geocoder = null, _geoEnabled = true;

    // İstanbul ilçe/semt merkezleri (Geocoding olmadan da konum güncellensin)
    var DISTRICTS = [
      { n: "Moda, Kadıköy", lat: 40.9785, lng: 29.0255 },
      { n: "Kadıköy", lat: 40.9905, lng: 29.0270 },
      { n: "Fenerbahçe, Kadıköy", lat: 40.9710, lng: 29.0430 },
      { n: "Caddebostan, Kadıköy", lat: 40.9630, lng: 29.0630 },
      { n: "Bostancı, Kadıköy", lat: 40.9530, lng: 29.0940 },
      { n: "Kozyatağı, Kadıköy", lat: 40.9740, lng: 29.0990 },
      { n: "Ataşehir", lat: 40.9925, lng: 29.1276 },
      { n: "Üsküdar", lat: 41.0226, lng: 29.0167 },
      { n: "Ümraniye", lat: 41.0166, lng: 29.1206 },
      { n: "Maltepe", lat: 40.9357, lng: 29.1314 },
      { n: "Kartal", lat: 40.8888, lng: 29.1860 },
      { n: "Beşiktaş", lat: 41.0426, lng: 29.0066 },
      { n: "Beyoğlu", lat: 41.0369, lng: 28.9778 },
      { n: "Şişli", lat: 41.0602, lng: 28.9877 },
      { n: "Fatih", lat: 41.0186, lng: 28.9497 },
      { n: "Bakırköy", lat: 40.9819, lng: 28.8772 },
      { n: "Sarıyer", lat: 41.1665, lng: 29.0565 }
    ];

    function setLoc(text) {
      var el = document.getElementById("mapLoc");
      if (el && text) el.textContent = text;
    }

    function nearestDistrict(center) {
      var lat = center.lat(), lng = center.lng();
      var best = null, bestD = Infinity;
      DISTRICTS.forEach(function (d) {
        var dl = d.lat - lat, dg = d.lng - lng;
        var dist = dl * dl + dg * dg;
        if (dist < bestD) { bestD = dist; best = d; }
      });
      if (best) {
        setLoc(best.n.indexOf(",") > -1 ? best.n : best.n + ", İstanbul");
      }
    }

    // Harita merkezini adrese çevirir; Geocoding yoksa en yakın ilçeye düşer
    function updateLocationLabel(center) {
      if (_geocoder && _geoEnabled) {
        _geocoder.geocode({ location: center }, function (results, status) {
          if (status === "OK" && results && results[0]) {
            var comp = results[0].address_components;
            function get(type) {
              for (var i = 0; i < comp.length; i++) {
                if (comp[i].types.indexOf(type) > -1) return comp[i].long_name;
              }
              return null;
            }
            var area = get("neighborhood") || get("sublocality") || get("administrative_area_level_2") || get("locality");
            var city = get("administrative_area_level_1") || get("locality");
            if (area && city && area !== city) { setLoc(area + ", " + city); return; }
            if (area || city) { setLoc(area || city); return; }
            nearestDistrict(center);
          } else {
            if (status === "REQUEST_DENIED" || status === "ERROR") _geoEnabled = false;
            nearestDistrict(center);
          }
        });
      } else {
        nearestDistrict(center);
      }
    }

    function showCard(p) {
      document.getElementById("mcImg").src = p.img;
      document.getElementById("mcImg").alt = p.name;
      document.getElementById("mcName").textContent = p.name;
      document.getElementById("mcRate").textContent = p.rating;
      document.getElementById("mcSub").innerHTML = p.cat + '<span class="dot">·</span>' + p.dist;
      document.getElementById("mcPrice").textContent = p.price;
      var card = document.getElementById("mapCard");
      card.classList.add("show");
      card.setAttribute("aria-hidden", "false");
      document.getElementById("mapLocate").style.bottom = "150px";
    }

    function hideCard() {
      var card = document.getElementById("mapCard");
      card.classList.remove("show");
      card.setAttribute("aria-hidden", "true");
      document.getElementById("mapLocate").style.bottom = "26px";
      if (_active) { _active.setActive(false); _active = null; }
    }

    function selectPin(pin) {
      if (_active && _active !== pin) _active.setActive(false);
      pin.setActive(true);
      _active = pin;
      showCard(pin.place);
      _map.panTo({ lat: pin.place.lat, lng: pin.place.lng });
    }

    function filterCat(cat) {
      hideCard();
      _pins.forEach(function (pin) {
        var show = cat === "tümü" || pin.place.tags.indexOf(cat) > -1;
        pin.setVisible(show);
      });
    }

    function initMap() {
      _map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 40.9875, lng: 29.0270 },
        zoom: 15,
        disableDefaultUI: true,
        gestureHandling: "greedy",
        clickableIcons: false,
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", stylers: [{ visibility: "off" }] },
          { featureType: "road", elementType: "labels.icon", stylers: [{ visibility: "off" }] }
        ]
      });

      // HTML overlay marker sınıfı (site fontunu kullanır)
      PinOverlay = function (place) {
        this.place = place;
        this.pos = new google.maps.LatLng(place.lat, place.lng);
        this.div = null;
        this.visible = true;
        this.setMap(_map);
      };
      PinOverlay.prototype = new google.maps.OverlayView();
      PinOverlay.prototype.onAdd = function () {
        var self = this;
        var d = document.createElement("div");
        d.className = "map-pin";
        d.textContent = this.place.price;
        d.addEventListener("click", function (e) {
          e.stopPropagation();
          selectPin(self);
        });
        this.div = d;
        this.getPanes().overlayMouseTarget.appendChild(d);
      };
      PinOverlay.prototype.draw = function () {
        if (!this.div) return;
        var pt = this.getProjection().fromLatLngToDivPixel(this.pos);
        if (pt) { this.div.style.left = pt.x + "px"; this.div.style.top = pt.y + "px"; }
      };
      PinOverlay.prototype.onRemove = function () {
        if (this.div) { this.div.remove(); this.div = null; }
      };
      PinOverlay.prototype.setActive = function (a) {
        if (this.div) this.div.classList.toggle("active", a);
      };
      PinOverlay.prototype.setVisible = function (v) {
        this.visible = v;
        if (this.div) this.div.style.display = v ? "" : "none";
      };

      PLACES.forEach(function (p) { _pins.push(new PinOverlay(p)); });

      _map.addListener("click", hideCard);

      // Haritada gezerken üstteki konumu güncelle
      _geocoder = new google.maps.Geocoder();
      _map.addListener("idle", function () {
        updateLocationLabel(_map.getCenter());
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("mapCardClose").addEventListener("click", hideCard);

      document.getElementById("mapLocate").addEventListener("click", function () {
        if (!navigator.geolocation || !_map) return;
        navigator.geolocation.getCurrentPosition(function (pos) {
          _map.panTo({ lat: pos.coords.latitude, lng: pos.coords.longitude });
          _map.setZoom(15);
        });
      });

      // Kategori seçimi
      document.getElementById("mapCats").addEventListener("click", function (e) {
        var pill = e.target.closest(".pill");
        if (!pill) return;
        this.querySelectorAll(".pill").forEach(function (b) { b.classList.remove("is-active"); });
        pill.classList.add("is-active");
        filterCat(pill.getAttribute("data-cat"));
      });
    });

    window.gm_authFailure = function () {
      document.getElementById("map").innerHTML =
        '<div style="display:grid;place-items:center;height:100%;padding:30px;text-align:center;color:#7a7a8c;font-size:14px;">Harita yüklenemedi. API anahtarını ve faturalandırmayı kontrol edin.</div>';
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7nXVxoT-s2SltmE4z769tgeNvnuZjTBY&callback=initMap" async defer></script>
</body>
</html>
