# Codemagic CI/CD — Gezgah
# Flutter projesi repo KÖKÜNDEDİR (app/ alt klasörü yok).
#
# ÖNEMLİ: Aşağıdaki "app_store_connect: Gezgah App Store API" satırındaki ad,
# Codemagic'te tanımladığın App Store Connect API key entegrasyonunun ADIyla
# AYNI olmalı. (Codemagic → Teams/Settings → Integrations → App Store Connect
# altındaki key adını yaz.)

workflows:
  # ---------------------------------------------------------------------------
  # iOS → TestFlight (App Store distribution imzası, otomatik)
  # ---------------------------------------------------------------------------
  ios-testflight:
    name: Gezgah iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic   # Codemagic Developer Portal'daki API key adı
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.gezgah.gezgah"
    scripts:
      - name: Flutter bağımlılıkları
        script: flutter pub get
      - name: İmza (Distribution sertifikası + App Store profili oluştur)
        script: |
          set -e
          keychain initialize
          # Sertifika özel anahtarı: Codemagic'te CERTIFICATE_PRIVATE_KEY varsa onu
          # kullan (her build aynı sertifikayı tekrar kullanır), yoksa üret.
          CERT_KEY=/tmp/cert_key.pem
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            printf '%s' "$CERTIFICATE_PRIVATE_KEY" > "$CERT_KEY"
          else
            openssl genrsa -out "$CERT_KEY" 2048
          fi
          # Distribution sertifikası + App Store profili yoksa oluştur, varsa getir.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:$CERT_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: IPA derle (release, otomatik build no)
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true              # TestFlight'a gönder
        # beta_groups:                          # istersen otomatik beta grubu dağıtımı
        #   - Internal Testers

  # ---------------------------------------------------------------------------
  # ANDROID → release APK + AAB (müşteri önizlemesi / Play)
  # ---------------------------------------------------------------------------
  android-release:
    name: Gezgah Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter bağımlılıkları
        script: flutter pub get
      - name: Statik analiz
        script: flutter analyze
      - name: APK + AAB derle
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
