name: gezgah
description: "Gezgah - yakınındaki en iyi yerleri keşfet."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_svg: ^2.0.10+1
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.0
  geocoding: ^3.0.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6
  device_info_plus: ^11.1.0
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# path_provider_android 2.3.x JNI tabanlı bindings'e geçti ve çözülen jni
# sürümüyle uyumsuz (JString/JObject/reference derleme hataları). JNI'den önceki
# (platform-channel) 2.2.x'e sabitleyerek jni/jni_flutter'ı ağaçtan çıkarıyoruz.
# path_provider yalnızca cached_network_image üzerinden transitif gelir.
dependency_overrides:
  path_provider_android: '>=2.2.0 <2.3.0'

# App ikonu üretimi (tek kaynak → tüm Android/iOS boyutları).
# 1) 1024x1024 PNG'i assets/icon/app_icon.png olarak koy.
# 2) flutter pub get
# 3) dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true # iOS ikonlarında şeffaflık olmamalı
  image_path_android: "assets/icon/android.png"
  image_path_ios: "assets/icon/apple.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.svg
    - assets/kedy.svg

  fonts:
    - family: gez_gah
      fonts:
        - asset: assets/fonts/gezgah_latin.ttf
    - family: gez_gah_ext
      fonts:
        - asset: assets/fonts/gezgah_ext.ttf
    - family: gez_gah_viet
      fonts:
        - asset: assets/fonts/gezgah_viet.ttf
